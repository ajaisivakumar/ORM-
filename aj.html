<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Boot Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
        button:hover { background-color: #0056b3; }
        #response { margin-top: 20px; font-weight: bold; color: #28a745; font-size: 1.2rem; }
    </style>
</head>
<body>

    <h2>Connect HTML Frontend to Spring Boot Backend</h2>
    <p>Click the button below to fetch a message from the Java server.</p>
    
    <button onclick="fetchHelloWorld()">Call Backend</button>

    <div id="response"></div>

    <script>
        function fetchHelloWorld() {
            // Replace 'http://localhost:8080' with your live cloud backend URL once deployed
            const backendUrl = 'http://localhost:8080/api/hello';

            fetch(backendUrl)
                .then(response => response.text())
                .then(data => {
                    document.getElementById('response').innerText = data;
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    document.getElementById('response').innerText = 'Failed to connect to backend server.';
                });
        }
    </script>
</body>
</html>
